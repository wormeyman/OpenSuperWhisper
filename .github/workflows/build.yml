name: Build Check

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install dependencies
        run: brew install cmake libomp rust
      - name: Set up Ruby (for xcpretty)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
      - name: Install xcpretty
        run: gem install xcpretty
      - name: Make run.sh executable
        run: chmod +x ./run.sh
      - name: Build with run.sh
        env:
          BUNDLE_ID_OVERRIDE: ru.starmel.OpenSuperWhisper.wormeyman
          DISPLAY_NAME_OVERRIDE: WormeymanDevOpenSuperWhisper
        run: ./run.sh build
      - name: Upload app artifact
        uses: actions/upload-artifact@v7
        if: success()
        with:
          name: WormeymanDevOpenSuperWhisper
          path: build/Build/Products/Debug/OpenSuperWhisper.app
